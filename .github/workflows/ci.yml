name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]

# Paths that contain plugin logic — QA review is only required for PRs touching these.
# Docs-only or config-only changes skip the QA round commit requirement automatically.
env:
  QA_PATHS: agents/ commands/ config/ hooks/ references/ scripts/ templates/ testing/ tests/

jobs:
  lint:
    name: Lint
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: ShellCheck
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! shellcheck -S warning "$file"; then
              failed=1
            fi
          done < <(find scripts hooks -type f -name "*.sh" -print0)
          if [ "$failed" -ne 0 ]; then
            echo "::error::ShellCheck found issues in one or more files (see above)"
            exit 1
          fi

      - name: Shell syntax check
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! bash -n "$file"; then
              echo "::error file=$file::Syntax error in $file"
              failed=1
            fi
          done < <(find scripts testing -type f -name "*.sh" -print0)
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

  test:
    name: Test
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats -v

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run bats tests
        run: bats tests/

      - name: Verify init/todo contracts
        run: bash scripts/verify-init-todo.sh

      - name: Verify CLAUDE bootstrap contracts
        run: bash scripts/verify-claude-bootstrap.sh

      - name: Verify bash script contracts
        run: bash testing/verify-bash-scripts-contract.sh

      - name: Verify command contracts
        run: bash testing/verify-commands-contract.sh

  linked-issue-check:
    name: Linked Issue
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Method 1: Check PR body for issue references
          # Matches: Fixes #N, Closes #N, Resolves #N (with optional owner/repo prefix)
          # Also matches standalone #N references
          body_has_ref=false
          if echo "$PR_BODY" | grep -qiE '(fix(es|ed)?|close[sd]?|resolve[sd]?)\s+([a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+)?#[0-9]+'; then
            body_has_ref=true
            echo "Found closing keyword issue reference in PR body"
          elif echo "$PR_BODY" | grep -qE '#[0-9]+'; then
            body_has_ref=true
            echo "Found issue reference (#N) in PR body"
          fi

          # Method 2: Check GitHub timeline for sidebar-linked issues
          sidebar_linked=false
          timeline=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/timeline" --paginate --jq '[.[] | select(.event == "cross-referenced" or .event == "connected")] | length')
          if [ "${timeline:-0}" -gt 0 ]; then
            sidebar_linked=true
            echo "Found sidebar-linked issue via GitHub timeline"
          fi

          if [ "$body_has_ref" = "true" ] || [ "$sidebar_linked" = "true" ]; then
            echo "Linked issue check passed"
          else
            echo "::error::PR must reference a tracking issue. Add 'Fixes #N', 'Closes #N', or 'Resolves #N' to the PR body, or link an issue via the GitHub sidebar. See CONTRIBUTING.md."
            exit 1
          fi

  qa-review-check:
    name: QA Review Evidence
    if: github.event_name == 'pull_request' && github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if QA-relevant files changed
        id: check-paths
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get files changed in this PR
          changed=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')

          # Check if any changed file is under a QA-relevant path
          qa_relevant=false
          for path in $QA_PATHS; do
            if echo "$changed" | grep -q "^${path}"; then
              qa_relevant=true
              break
            fi
          done

          echo "qa_relevant=$qa_relevant" >> "$GITHUB_OUTPUT"
          if [ "$qa_relevant" = "false" ]; then
            echo "No QA-relevant paths changed — skipping QA round check"
          fi

      - name: Check for QA round commits
        if: steps.check-paths.outputs.qa_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get first line of each commit message (avoids double-counting from multi-line bodies)
          commits=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --paginate --jq '.[].commit.message | split("\n")[0]')

          # Count commits matching: fix(something): address QA round N
          qa_count=$(echo "$commits" | grep -ciE '^fix\(.*\): address QA round [0-9]+' || true)

          echo "Found $qa_count QA round commit(s)"

          if [ "$qa_count" -lt 3 ]; then
            echo "::error::PR requires at least 3 QA round commits (fix(scope): address QA round N). Found $qa_count. See CONTRIBUTING.md for the QA review process."
            exit 1
          fi

          echo "QA review evidence verified ($qa_count rounds)"
