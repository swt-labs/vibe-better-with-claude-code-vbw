name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shell lint checks
        run: bash testing/run-lint.sh

  bats-tests:
    name: Bats Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats -v

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run bats shard
        env:
          SHARD: ${{ matrix.shard }}
          TOTAL_SHARDS: 4
        run: |
          files=()
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            files+=("$file")
          done < <(bash testing/list-bats-files.sh --shardable)
          bash testing/run-bats-shard.sh "$SHARD" "$TOTAL_SHARDS" "${files[@]}"

  bats-serial:
    name: Bats Tests (serial)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats -v

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run serial bats files
        run: |
          files=()
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            files+=("$file")
          done < <(bash testing/list-bats-files.sh --serial)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No serial bats files configured, skipping"
            exit 0
          fi
          bats "${files[@]}"

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run all contract checks (parallel)
        run: |
          declare -a NAMES=()
          declare -a PIDS=()
          declare -a RESULTS=()
          declare -a FAILED_NAMES=()
          run_check() {
            local name="$1" cmd="$2"
            NAMES+=("$name")
            bash -c "$cmd" > "/tmp/contract-$name.out" 2>&1 &
            PIDS+=("$!")
          }

          # Discover contract tests from shared registry (single source of truth)
          DISCOVERY_OUTPUT=$(bash testing/list-contract-tests.sh)
          if [[ -z "$DISCOVERY_OUTPUT" ]]; then
            echo "ERROR: No contract tests discovered from testing/list-contract-tests.sh"
            exit 1
          fi

          while IFS=$'\t' read -r name path; do
            [[ -z "$name" ]] && continue
            run_check "$name" "bash $path"
          done <<< "$DISCOVERY_OUTPUT"

          failures=0
          for i in "${!PIDS[@]}"; do
            if wait "${PIDS[$i]}"; then
              RESULTS[$i]=0
            else
              RESULTS[$i]=1
              failures=$((failures + 1))
              FAILED_NAMES+=("${NAMES[$i]}")
            fi
          done

          for i in "${!NAMES[@]}"; do
            if [ "${RESULTS[$i]:-1}" -eq 0 ]; then
              echo "PASS: ${NAMES[$i]}"
            else
              echo "FAIL: ${NAMES[$i]}"
            fi
          done

          if [ "$failures" -gt 0 ]; then
            echo ""
            for i in "${!NAMES[@]}"; do
              [ "${RESULTS[$i]:-1}" -ne 0 ] || continue
              echo "::error::FAIL: ${NAMES[$i]}"
              echo "::group::${NAMES[$i]} output"
              cat "/tmp/contract-${NAMES[$i]}.out"
              echo "::endgroup::"
            done
            echo "Failed contract scripts: ${FAILED_NAMES[*]}"
          fi

          echo ""
          echo "Contract checks: $(( ${#NAMES[@]} - failures ))/${#NAMES[@]} passed"
          [ "$failures" -eq 0 ] || exit 1

  test:
    name: Test
    if: always()
    needs: [bats-tests, bats-serial, contract-tests, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.bats-tests.result }}" != "success" ] || [ "${{ needs.bats-serial.result }}" != "success" ] || [ "${{ needs.contract-tests.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "One or more test jobs failed:"
            echo "  lint: ${{ needs.lint.result }}"
            echo "  bats-tests: ${{ needs.bats-tests.result }}"
            echo "  bats-serial: ${{ needs.bats-serial.result }}"
            echo "  contract-tests: ${{ needs.contract-tests.result }}"
            exit 1
          fi
          echo "All test jobs passed."
