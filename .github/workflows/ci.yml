name: CI

on:
  pull_request:
  push:
    branches: [main]

# Paths that contain plugin logic — QA review is only required for PRs touching these.
# Docs-only or config-only changes skip the QA round commit requirement automatically.
env:
  QA_PATHS: .github/workflows/ agents/ commands/ config/ hooks/ references/ scripts/ templates/ testing/ tests/

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: ShellCheck
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! shellcheck -S warning "$file"; then
              failed=1
            fi
          done < <(find scripts hooks -type f -name "*.sh" -print0)
          if [ "$failed" -ne 0 ]; then
            echo "::error::ShellCheck found issues in one or more files (see above)"
            exit 1
          fi

      - name: Shell syntax check
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! bash -n "$file"; then
              echo "::error file=$file::Syntax error in $file"
              failed=1
            fi
          done < <(find scripts testing -type f -name "*.sh" -print0)
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

  bats-tests:
    name: Bats Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats -v

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run bats shard
        env:
          SHARD: ${{ matrix.shard }}
          TOTAL_SHARDS: 4
        run: |
          files=(tests/*.bats)
          shard_files=()
          for i in "${!files[@]}"; do
            if [ $((i % TOTAL_SHARDS)) -eq "$SHARD" ]; then
              shard_files+=("${files[$i]}")
            fi
          done
          echo "Shard $SHARD: running ${#shard_files[@]} of ${#files[@]} bats files"
          if [ "${#shard_files[@]}" -eq 0 ]; then
            echo "Shard $SHARD: no bats files assigned, skipping"
            exit 0
          fi
          bats "${shard_files[@]}"

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y -qq jq

      - name: Run all contract checks (parallel)
        run: |
          declare -a NAMES=()
          declare -a PIDS=()
          declare -a RESULTS=()
          declare -a FAILED_NAMES=()
          run_check() {
            local name="$1" cmd="$2"
            NAMES+=("$name")
            bash -c "$cmd" > "/tmp/contract-$name.out" 2>&1 &
            PIDS+=("$!")
          }

          run_check "init-todo"                "bash scripts/verify-init-todo.sh"
          run_check "claude-bootstrap"         "bash scripts/verify-claude-bootstrap.sh"
          run_check "bash-scripts-contract"    "bash testing/verify-bash-scripts-contract.sh"
          run_check "commands-contract"        "bash testing/verify-commands-contract.sh"
          run_check "no-inline-exec-spans"     "bash testing/verify-no-inline-exec-spans.sh"
          run_check "plugin-root-resolution"   "bash testing/verify-plugin-root-resolution.sh"
          run_check "hook-event-name"          "bash testing/verify-hook-event-name.sh"
          run_check "plan-filename-convention" "bash testing/verify-plan-filename-convention.sh"
          run_check "skill-activation"         "bash testing/verify-skill-activation.sh"
          run_check "permission-mode-contract" "bash testing/verify-permission-mode-contract.sh"
          run_check "delegation-guard"         "bash testing/verify-delegation-guard.sh"
          run_check "summary-status-contract"  "bash testing/verify-summary-status-contract.sh"
          run_check "summary-utils-contract"   "bash testing/verify-summary-utils-contract.sh"
          run_check "exec-state-reconciliation" "bash testing/verify-exec-state-reconciliation.sh"
          run_check "statusline-qa-lifecycle"  "bash testing/verify-statusline-qa-lifecycle.sh"
          run_check "statusline-429-backoff"   "bash testing/verify-statusline-429-backoff.sh"
          run_check "uat-recurrence"           "bash testing/verify-uat-recurrence.sh"
          run_check "lead-research-conditional" "bash testing/verify-lead-research-conditional.sh"
          run_check "lsp-setup"                "bash testing/verify-lsp-setup.sh"
          run_check "lsp-first-policy"         "bash testing/verify-lsp-first-policy.sh"
          run_check "claude-md-staleness"      "bash testing/verify-claude-md-staleness.sh"
          run_check "dev-recovery-guidance"    "bash testing/verify-dev-recovery-guidance.sh"
          run_check "live-validation-policy"   "bash testing/verify-live-validation-policy.sh"
          run_check "ghost-team-cleanup"       "bash testing/verify-ghost-team-cleanup.sh"
          run_check "qa-persistence-contract"  "bash testing/verify-qa-persistence-contract.sh"

          failures=0
          for i in "${!PIDS[@]}"; do
            if wait "${PIDS[$i]}"; then
              RESULTS[$i]=0
            else
              RESULTS[$i]=1
              failures=$((failures + 1))
              FAILED_NAMES+=("${NAMES[$i]}")
            fi
          done

          for i in "${!NAMES[@]}"; do
            if [ "${RESULTS[$i]:-1}" -eq 0 ]; then
              echo "PASS: ${NAMES[$i]}"
            else
              echo "FAIL: ${NAMES[$i]}"
            fi
          done

          if [ "$failures" -gt 0 ]; then
            echo ""
            for i in "${!NAMES[@]}"; do
              [ "${RESULTS[$i]:-1}" -ne 0 ] || continue
              echo "::error::FAIL: ${NAMES[$i]}"
              echo "::group::${NAMES[$i]} output"
              cat "/tmp/contract-${NAMES[$i]}.out"
              echo "::endgroup::"
            fi
            echo "Failed contract scripts: ${FAILED_NAMES[*]}"
          fi

          echo ""
          echo "Contract checks: $(( ${#NAMES[@]} - failures ))/${#NAMES[@]} passed"
          [ "$failures" -eq 0 ] || exit 1

  qa-review-check:
    name: QA Review Evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect release PR
        id: release-pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if printf '%s\n' "$PR_TITLE" | grep -qE '^chore: release v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release PR detected — skipping QA review evidence check"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if QA-relevant files changed
        if: steps.release-pr.outputs.skip != 'true'
        id: check-paths
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get files changed in this PR
          changed=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')

          # Check if any changed file is under a QA-relevant path
          qa_relevant=false
          for path in $QA_PATHS; do
            if echo "$changed" | grep -q "^${path}"; then
              qa_relevant=true
              break
            fi
          done

          echo "qa_relevant=$qa_relevant" >> "$GITHUB_OUTPUT"
          if [ "$qa_relevant" = "false" ]; then
            echo "No QA-relevant paths changed — skipping QA round check"
          fi

      - name: Check for QA round commits
        if: steps.release-pr.outputs.skip != 'true' && steps.check-paths.outputs.qa_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get first line of each commit message (avoids double-counting from multi-line bodies)
          commits=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits" --paginate --jq '.[].commit.message | split("\n")[0]')

          # Count commits matching: fix(something): address QA round N
          qa_count=$(echo "$commits" | grep -ciE '^fix\(.*\): address QA round [0-9]+' || true)

          echo "Found $qa_count QA round commit(s)"

          if [ "$qa_count" -lt 3 ]; then
            echo "::error::PR requires at least 3 QA round commits (fix(scope): address QA round N). Found $qa_count. See CONTRIBUTING.md for the QA review process."
            exit 1
          fi

          echo "QA review evidence verified ($qa_count rounds)"

      - name: Release PR skip notice
        if: steps.release-pr.outputs.skip == 'true'
        run: |
          echo "Skipping QA review evidence for release PR title format chore: release v{number}."
